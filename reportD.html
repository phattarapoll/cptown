<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Service Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --plan-color: #3b82f6;
            --active-color: #a855f7;
            --success-color: #10b981;
            --idle-color: #94a3b8;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animation สำหรับปุ่มกะพริบ เทา-ดำ */
        @keyframes blink-dark {
            0% { background-color: #4b5563; } /* สีเทาเข้ม */
            50% { background-color: #000000; } /* สีดำ */
            100% { background-color: #4b5563; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        header { text-align: center; margin-bottom: 40px; }
        
        .logo {
            width: 130px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: all 0.5s;
        }
        .logo:hover { transform: rotate(5deg) scale(1.1); }

        .status-timeline {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            position: relative;
        }

        .step {
            display: none;
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
            transition: 0.5s;
        }

        .step.active { 
            display: block;
            animation: slideUp 0.5s ease;
        }
        
        .step-icon {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            color: white;
            /* เพิ่มแสงสีแดงเรืองๆ อยู่ด้านหลังทุกสถานะ */
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); 
        }

        .step-0 .step-icon { background: var(--idle-color); }
        .step-1 .step-icon { background: var(--plan-color); }
        .step-2 .step-icon { background: var(--active-color); animation: pulse 2s infinite; }
        .step-3 .step-icon { background: var(--success-color); }

        .display-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #eee;
            transition: 0.3s;
        }
        .info-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .label { font-size: 0.9rem; color: #64748b; margin-bottom: 5px; font-weight: bold; }
        .value { font-size: 1.4rem; color: #1e293b; font-weight: 800; }

        .grade-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #f1f5f9;
            border-radius: 10px;
            font-weight: bold;
            color: var(--active-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
        }

        /* ปุ่มที่กะพริบสีเทา-ดำ */
        .btn-blink { 
            animation: blink-dark 1.5s infinite; 
            color: white; 
        }
        
        .btn-sub { background: white; color: #1e293b; border: 2px solid #1e293b; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        #admin-panel {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            margin-top: 30px;
            display: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
        }
    </style>
</head>
<body>

<header>
    <img src="assets\images\tm.png" alt="Logo" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3467/3467739.png'">
    <h1 style="color: #1e293b; margin-top: 15px;">ตรวจคัดกรองสุขภาพช่องปากในนักเรียน</h1>
    <label>งานทันตสาธารณสุข ศูนย์บริการสาธารณสุขเทศบาลเมืองขุมพร(ตึกเก่า)</label>
</header>

<div class="container">
    <div class="status-timeline">
        <div class="step step-0 active" id="st-0">
            <div class="step-icon"><i class="fas fa-calendar-times"></i></div>
            <div style="font-weight: 800; color: var(--idle-color);">ยังไม่มีแผนให้บริการ </div>
        </div>
        <div class="step step-1" id="st-1">
            <div class="step-icon"><i class="fas fa-file-signature"></i></div>
            <div style="font-weight: 800; color: var(--plan-color);">วางแผนการออกตรวจ <span class="current-year"></span></div>
        </div>
        <div class="step step-2" id="st-2">
            <div class="step-icon"><i class="fas fa-user-md"></i></div>
            <div style="font-weight: 800; color: var(--active-color);">กำลังออกหน่วยคัดกรอง ปี <span class="current-year"></span></div>
        </div>
        <div class="step step-3" id="st-3">
            <div class="step-icon"><i class="fas fa-check-double"></i></div>
            <div style="font-weight: 800; color: var(--success-color);">เสร็จสิ้นกระบวนการ ปี <span class="current-year"></span></div>
        </div>
    </div>

    <div class="display-grid">
        <div class="info-card">
            <div class="label"><i class="fas fa-university"></i> สถานที่ปัจจุบัน</div>
            <div class="value" id="disp-school">ไม่ระบุ</div>
        </div>
        <div class="info-card">
            <div class="label"><i class="fas fa-users"></i> ชั้นที่กำลังตรวจ</div>
            <div class="value" id="disp-grade">-</div>
        </div>
    </div>

    <a href="https://script.google.com/macros/s/AKfycbwstQtWNc0CHmAVwDMgOWUKvFxuMKX8JmiRdQzJHyomBLe-2S0seLuxfQctSZiWHDpK/exec" class="btn btn-blink">
        <i class="fas fa-list-check"></i> ตรวจสอบรายชื่อ/กดยอมรับบริการ
    </a>
    
    <a href="https://cptown.6te.net/" class="btn btn-sub"><i class="fas fa-globe"></i> เว็บไซต์งานทันตสาธารณสุข</a>

    <div style="text-align: center; margin-top: 20px;">
        <small id="login-btn" onclick="showLogin()" style="cursor:pointer; color: #94a3b8;">จัดการข้อมูล (Admin)</small>
        
        <div id="login-form" style="display:none; margin-top:15px;">
            <input type="password" id="pass" placeholder="รหัสผ่าน" style="width:200px">
            <button onclick="doLogin()" class="btn-blink" style="padding:10px 20px; border-radius:10px; border:none; cursor:pointer;">ตกลง</button>
        </div>

        <div id="admin-panel">
            <h3 style="margin-top:0">ตั้งค่าสถานะปัจจุบัน</h3>
            
            <label>ขั้นตอน:</label>
            <select id="set-status" onchange="sync()">
                <option value="0">0. ยังไม่มีแผนให้บริการ</option>
                <option value="1">1. วางแผนการออกหน่วย</option>
                <option value="2">2. ออกหน่วยบริการ</option>
                <option value="3">3. เสร็จสิ้นกระบวนการ</option>
            </select>

            <label>โรงเรียน:</label>
            <select id="set-school" onchange="sync()">
                <option value="ไม่ระบุ">ไม่ระบุ</option>
                <option value="รร.สหศึกษา">รร.สหศึกษา</option>
                <option value="รร.เทศบาล1(บ้านท่าตะเภา)">รร.เทศบาล1(บ้านท่าตะเภา)</option>
                <option value="รร.ฝวาหมินกงลิ">รร.ฝวาหมินกงลิ</option>
                <option value="รร.อนุบาลเมืองชุมพร">รร.อนุบาลเมืองชุมพร</option>
                <option value="รร.ศรียาภัย">รร.ศรียาภัย</option>
                <option value="รร.สอาดเผดิมวิทยา">รร.สอาดเผดิมวิทยา</option>
            </select>

            <label>ระดับชั้น:</label>
            <select id="set-grade" onchange="sync()">
                <option value="-">ไม่ระบุ</option>
                <option value="ป.1">ป.1</option>
                <option value="ป.3">ป.3</option>
                <option value="ป.6">ป.6</option>
                <option value="ม.1">ม.1</option>
                <option value="ม.3">ม.3</option>
            </select>
            
            <button onclick="location.reload()" class="btn-sub" style="margin-top:20px; width:100%; font-size:0.9rem">ออกจากระบบ / ปิดส่วนนี้</button>
        </div>
    </div>
</div>

<script>
    function updateYear() {
        const now = new Date();
        const yearBE = now.getFullYear() + 543;
        const yearElements = document.getElementsByClassName('current-year');
        for(let el of yearElements) {
            el.innerText = yearBE;
        }
        
        const statusSelect = document.getElementById('set-status');
        for(let opt of statusSelect.options) {
            opt.text = opt.text + " " + yearBE;
        }
    }

    updateYear();

    function showLogin() {
        document.getElementById('login-form').style.display = 'block';
    }

    function doLogin() {
        if(document.getElementById('pass').value === '3946') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('login-btn').style.display = 'none';
        } else {
            alert('รหัสผ่านไม่ถูกต้อง');
        }
    }

    function sync() {
        const status = document.getElementById('set-status').value;
        const school = document.getElementById('set-school').value;
        const grade = document.getElementById('set-grade').value;

        document.getElementById('disp-school').innerText = school;
        document.getElementById('disp-grade').innerHTML = `<span class="grade-badge">${grade}</span>`;

        for(let i=0; i<=3; i++) {
            const el = document.getElementById('st-'+i);
            el.classList.remove('active');
            if(i == status) {
                el.classList.add('active');
            }
        }
    }
</script>

</body>
</html>
