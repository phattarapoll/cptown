<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังลิงก์ทางลัด URL Redirect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0ea5e9;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px; }
        .container { background: var(--card-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); width: 100%; max-width: 600px; margin: auto; text-align: center; }
        h1 { font-size: 1.8rem; color: var(--primary-color); margin-bottom: 8px; font-weight: 700; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; }
        
        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; }
        th { background-color: #f1f5f9; color: var(--text-main); font-weight: 600; }
        
        .link-short { color: var(--primary-color); font-weight: 600; text-decoration: none; }
        .link-short:hover { text-decoration: underline; }
        
        .btn-copy { background: #e2e8f0; border: none; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .btn-copy:hover { background: #cbd5e1; }

        footer { margin-top: 40px; text-align: center; font-size: 0.9rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 15px; width: 100%; max-width: 600px; }
        footer strong { color: var(--text-main); font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ระบบลิงก์ทางลัดภายใน</h1>
        <p class="subtitle">รวมลิงก์ด่วนและระบบส่งต่อ URL ปลอดภัยจากการบล็อกของเครือข่าย</p>
        
        <div id="redirect-status" style="display:none; padding: 15px; background: #e0f2fe; color: #0369a1; border-radius: 8px; margin-bottom: 20px; font-weight: 500;">
            กำลังนำทางไปยังลิงก์ปลายทาง...
        </div>

        <div class="table-container">
            <h3>📋 รายการลิงก์สั้นที่ใช้งานได้</h3>
            <table>
                <thead>
                    <tr>
                        <th>ชื่อทางลัด</th>
                        <th>ลิงก์สั้นสำหรับคัดลอกไปใช้</th>
                    </tr>
                </thead>
                <tbody id="link-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <footer>
        ผู้สร้างและพัฒนา : <strong>นายภัทรพล ไพศาลวัชรเมธี ทันตสาธารณสุขอาวุโส</strong>
    </footer>

    <script>
        // 📝 ตรงนี้คือที่สำหรับให้คุณภัทรพลมาเพิ่ม/แก้ไข ลิงก์ที่ต้องการย่อครับ!
        // รูปแบบคือ 'ชื่อย่อ': 'ลิงก์จริงขนาดยาว'
        const urlMap = {
            'dent': 'https://www.google.com', // แก้เป็นลิงก์โปรแกรม Dent-check หรือลิงก์ที่ต้องการได้เลย
            'google': 'https://www.google.com',
            'report': 'https://example.com/your-very-long-dental-report-link-2026' 
        };

        // รับค่าฐาน URL ของเว็บปัจจุบัน (เช่น https://phattarapoll.github.io/cptown/url.html)
        const currentUrl = window.location.href.split('?')[0];

        // 1. ตรวจสอบว่ามีการเรียกใช้ลิงก์ย่อไหม (เช่น url.html?go=dent)
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('go');

        if (target && urlMap[target]) {
            // ถ้าเจอคำย่อที่ตรงกัน ให้เปิดลิงก์ปลายทางทันที
            document.getElementById('redirect-status').style.display = 'block';
            window.location.href = urlMap[target];
        } else {
            // 2. ถ้าเข้าหน้าเว็บปกติ ให้แสดงตารางรายการลิงก์สั้นให้กดก๊อปปี้ไปใช้
            const tbody = document.getElementById('link-table-body');
            for (const key in urlMap) {
                const shortLink = `${currentUrl}?go=${key}`;
                const row = `
                    <tr>
                        <td><strong>${key}</strong></td>
                        <td>
                            <a class="link-short" href="${shortLink}" target="_blank">${shortLink}</a>
                            <button class="btn-copy" onclick="copyText('${shortLink}')">คัดลอก</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('คัดลอกลิงก์ทางลัดแล้ว นำไปส่งต่อได้เลยครับ!');
            });
        }
    </script>

</body>
</html>
