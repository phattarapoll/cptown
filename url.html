<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบย่อลิงก์ URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 550px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        input[type="url"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="url"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* ส่วนแสดงผลลัพธ์ */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #f1f5f9;
            border-radius: 10px;
            display: none; 
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .result-url-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .short-url {
            flex: 1;
            padding: 10px 12px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--primary-color);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-copy {
            background: #e2e8f0;
            color: var(--text-main);
            padding: 10px 16px;
            font-size: 0.9rem;
            border-radius: 6px;
            width: auto;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: #cbd5e1;
        }

        /* Footer เครดิต */
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 15px;
            width: 100%;
            max-width: 550px;
        }

        footer strong {
            color: var(--text-main);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>URL Shortener</h1>
        <p class="subtitle">ย่อลิงก์ของคุณให้สั้นลง ง่ายต่อการแบ่งปันและใช้งาน</p>
        
        <form id="shortenForm" onsubmit="shortenURL(event)">
            <div class="input-group">
                <label for="longUrl">วางลิงก์ขนาดยาวของคุณที่นี่</label>
                <input type="url" id="longUrl" placeholder="https://example.com/very-long-link-address" required>
            </div>
            <button type="submit" id="submitBtn">ย่อลิงก์เลย</button>
        </form>

        <div class="result-box" id="resultBox">
            <p>ลิงก์ที่ย่อเสร็จแล้ว:</p>
            <div class="result-url-wrapper">
                <div class="short-url" id="shortUrlText">กำลังย่อลิงก์...</div>
                <button type="button" class="btn-copy" onclick="copyToClipboard()">คัดลอก</button>
            </div>
        </div>
    </div>

    <footer>
        ผู้สร้างและพัฒนา : <strong>นายภัทรพล ไพศาลวัชรเมธี ทันตสาธารณสุขอาวุโส</strong>
    </footer>

    <script>
        async function shortenURL(event) {
            event.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const resultBox = document.getElementById('resultBox');
            const shortUrlText = document.getElementById('shortUrlText');
            const submitBtn = document.getElementById('submitBtn');
            
            // แสดงสถานะกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerText = 'กำลังประมวลผล...';
            shortUrlText.innerText = 'กำลังสร้างลิงก์สั้น...';
            resultBox.style.display = 'block';

            // ดึงข้อมูลผ่าน Is.gd API (เปิดสิทธิ์แบบ CORS เพื่อให้เรียกจากหน้าเว็บได้โดยตรง)
            const apiUrl = `https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`;

            try {
                const response = await fetch(apiUrl);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.shorturl) {
                        shortUrlText.innerText = data.shorturl;
                    } else if (data.errormessage) {
                        shortUrlText.innerText = 'เกิดข้อผิดพลาด: ' + data.errormessage;
                    }
                } else {
                    throw new Error('Network response was not ok.');
                }
            } catch (error) {
                console.error(error);
                // หากยังติดปัญหาบล็อกจากระบบเครือข่ายอีก จะแนะนำทางเลือกให้กับผู้ใช้แทน
                shortUrlText.style.whiteSpace = 'normal';
                shortUrlText.innerHTML = `เครือข่ายอินเทอร์เน็ตนี้จำกัดการเข้าถึง API ย่อลิงก์ภายนอกอัตโนมัติ<br>แนะนำให้เข้าใช้งานโดยตรงที่เว็บสาธารณะแทนครับ`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'ย่อลิงก์เลย';
            }
        }

        function copyToClipboard() {
            const shortUrl = document.getElementById('shortUrlText').innerText;
            if(shortUrl.startsWith('http')) {
                navigator.clipboard.writeText(shortUrl).then(() => {
                    alert('คัดลอกลิงก์ไปยังคลิปบอร์ดแล้ว!');
                }).catch(err => {
                    alert('ไม่สามารถคัดลอกได้อัตโนมัติ กรุณาก๊อปปี้ด้วยตัวเอง');
                });
            } else {
                alert('ไม่มีลิงก์ที่สามารถคัดลอกได้ในขณะนี้');
            }
        }
    </script>

</body>
</html>
