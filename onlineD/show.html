<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิวทันตสาธารณสุข</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Prompt', sans-serif; 
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background-color: #0d9488;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .calendar-container {
            flex: 1;
            width: 95%;
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* ปรับความสูงให้เหมาะสม */
        }
		.responsive-text {
			white-space: nowrap;      /* บังคับไม่ให้ขึ้นบรรทัดใหม่ */
			font-size: 14px;          /* ขนาดเริ่มต้น */
			display: inline-block;
			max-width: 100%;          /* ไม่ให้เกินความกว้างหน้าจอ */
			overflow: hidden;
			text-overflow: ellipsis;  /* ถ้าตัวอักษรยาวเกินไป ให้แสดงเป็นจุด ... แทนการขึ้นบรรทัดใหม่ */
		}
        iframe { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            border: 0; 
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
		@keyframes fadeInUp {
			from { opacity: 0; transform: translateY(20px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.header {
			animation: fadeInUp 1s ease-out;
		}
		.footer-card {
			background: white;
			padding: 15px;
			border-radius: 10px;
			box-shadow: 0 4px 6px rgba(0,0,0,0.1);
			transition: transform 0.3s ease; /* เพิ่มลูกเล่นการย่อขยาย */
			margin: 10px auto;
			max-width: 80%;
		}
		.footer-card:hover {
			transform: scale(1.02); /* ขยายขึ้นเล็กน้อยเมื่อเอาเมาส์ชี้ */
		}
    </style>
</head>
<body>

    <div class="header">
		<div>คิวทันตสาธารณสุข</div>
		<div class="responsive-text" style="font-size: 0.6em;">งานทันตสาธารณสุข กองสาธารณสุขและสิ่งแวดล้อม</div>
	</div>


    <div class="calendar-container">
        <div class="container">
            <iframe src="https://calendar.google.com/calendar/embed?height=900&wkst=1&ctz=Asia%2FBangkok&showTitle=0&showCalendars=0&showTz=0&mode=AGENDA&showNav=0&showDate=0&showPrint=0&showTabs=0&src=MGFmZWQzNzYwYWMzMTY4ZGQzZTJiZGM4ZDNmOWMyZmUyMWFiYWYwZjcxMjhmNWNkM2IyMjU5YmM0NThmN2IyZEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=dGgudGgjaG9saWRheUBncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%238e24aa&color=%23d50000" style="border-width:0" width="800" height="900" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

    <div class="footer">
			ผู้สร้างและพัฒนา นายภัทรพล ไพศาลวัชรเมธี <br> 
			ทันตสาธารณสุขอาวุโส <br>
</div>

</body>
</html>
