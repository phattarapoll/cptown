<!DOCTYPE html>
<html lang="th">
<head>

    <title>คิวทันตสาธารณสุข</title>
    <style>
        body {

            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);

        }
        .container {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* ปรับความสูงให้เหมาะสม */

        iframe {

            top: 0; left: 0;

            padding: 20px;
            color: #666;

</head>
