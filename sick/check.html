<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบอนุมัติวันลา | เทศบาลเมืองชุมพร</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ปรับแต่งเพิ่มเติมให้เข้ากับสไตล์เดิม */
        body {
            background: var(--bg-gradient);
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 50px;
        }

        .admin-header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        .admin-header h1 { font-size: 2.2rem; margin: 0; }
        .admin-header p { opacity: 0.9; font-weight: 300; }

        .container-admin {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Login Info Card */
        #login-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        #login-message { font-weight: 600; color: var(--primary); margin: 0; }
        
        .logout-btn-admin {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Table Card */
        .table-card-modern {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .table-card-modern h2 {
            margin-top: 0;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; color: var(--text-light); font-weight: 600; border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; color: var(--text-dark); }

        /* Keypad Modal Modernization */
        .modal-content-modern {
            background: white;
            padding: 35px;
            border-radius: 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .password-box-modern {
            height: 65px;
            background: #f1f5f9;
            border-radius: 16px;
            margin: 20px 0;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 12px;
            color: var(--primary);
            border: 2px solid #e2e8f0;
        }

        .admin-select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-family: 'Sarabun';
            background: #f8fafc;
            margin-top: 8px;
        }

        .keypad-modern {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .key-modern {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dark);
        }

        .key-modern:hover { background: var(--primary); color: white; transform: translateY(-3px); }
        .key-modern.delete { grid-column: span 3; aspect-ratio: auto; border-radius: 12px; background: #fee2e2; color: #ef4444; padding: 12px; font-size: 1.1rem; }
        .key-modern.delete:hover { background: #ef4444; color: white; }

        .btn-approve { background: var(--success); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-reject { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-left: 5px; }

    </style>
</head>
<body>

    <header class="admin-header">
        <h1>ระบบอนุมัติวันลา</h1>
        <p>สำหรับผู้ดูแลระบบและหัวหน้าฝ่ายบริการสาธารณสุข</p>
    </header>

    <div class="container-admin">
        
        <!-- ข้อมูลการล็อกอิน -->
        <div id="login-info" style="display: none;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="login-dot"></div>
                <p id="login-message"></p>
            </div>
            <button id="logout-button" class="logout-btn-admin">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>

        <!-- รายการคำขอลา -->
        <div id="pending-requests-section" class="table-card-modern">
            <h2><i class="fa-solid fa-clipboard-list"></i> รายการคำขอลาที่รออนุมัติ</h2>
            <div class="table-responsive">
                <table id="pending-leave-table">
                    <thead>
                        <tr>
                            <th>ชื่อ-นามสกุล</th>
                            <th>ประเภทการลา</th>
                            <th>จำนวนวัน</th>
                            <th>วันที่เริ่ม-สิ้นสุด</th>
                            <th>เหตุผลการลา</th>
                            <th>การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- ข้อมูลจะถูกเติมโดย admin_approval.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal เข้าสู่ระบบ (Keypad) -->
    <div id="login-modal" class="modal" style="display: flex;"> <!-- เปลี่ยนเป็น flex เพื่อทดสอบ หรือจัดการผ่าน JS -->
        <div class="modal-content-modern">
            <h2 style="margin-bottom: 5px;">เข้าสู่ระบบ</h2>
            <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px;">เฉพาะผู้มีอำนาจอนุมัติเท่านั้น</p>
            
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="font-size: 0.85rem; font-weight: 600;">เลือกผู้ดูแลระบบ</label>
                <select id="officer-select" class="admin-select"></select>
            </div>

            <div style="text-align: left;">
                <label style="font-size: 0.85rem; font-weight: 600;">รหัสผ่าน 4 หลัก</label>
                <div id="password-display" class="password-box-modern"></div>
            </div>

            <div id="numeric-keypad" class="keypad-modern">
                <button class="key-modern" data-key="1">1</button>
                <button class="key-modern" data-key="2">2</button>
                <button class="key-modern" data-key="3">3</button>
                <button class="key-modern" data-key="4">4</button>
                <button class="key-modern" data-key="5">5</button>
                <button class="key-modern" data-key="6">6</button>
                <button class="key-modern" data-key="7">7</button>
                <button class="key-modern" data-key="8">8</button>
                <button class="key-modern" data-key="9">9</button>
                <button class="key-modern" data-key="0">0</button>
                <button class="key-modern delete" data-key="delete">
                    <i class="fa-solid fa-backspace"></i> ลบข้อมูล
                </button>
            </div>
            <p id="login-status" class="login-status" style="margin-top: 15px;"></p>
        </div>
    </div>

    <!-- Modal รายละเอียดการอนุมัติ -->
    <div id="approval-modal" class="modal">
        <div class="modal-content-wrapper">
            <div id="modal-content" class="modal-content-modern" style="max-width: 500px;">
                <!-- เนื้อหาจะถูกเติมโดย admin_approval.js -->
            </div>
        </div>
    </div>

    <script src="admin_approval.js"></script>
    <script src="login_popup.js"></script>
</body>
</html>
